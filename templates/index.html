<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>GPS Map</title>

    <link rel="stylesheet" href="/static/leaflet.css">
    <script src="/static/leaflet.js"></script>
    <script src="/static/socket.io.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
        }

        /* Container for the Right Button */
        #controls-right {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
        }

        /* Container for the Left Button */
        #controls-left {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 1000;
        }

        /* Shared styling for both buttons */
        .control-btn {
            padding: 14px 22px;
            background-color: gray;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .control-btn:hover {
            background-color: darkgray;
        }

        .control-btn:active {
            background-color: rgb(91, 90, 90);
        }
    
        #map {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            background-color: white;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- change these buttons so they could share a styling class and
     have unique div ids, DONE
-->
<div id="controls-left">
    <button class="control-btn" onclick="stopRobot()">STOP ROBOT</button>
</div>

<div id="controls-right">
    <button class="control-btn" onclick="comeToBase()">COME TO BASE</button>
</div>

<script>
    var map = L.map("map", {
        zoomControl: true,
        attributionControl: false
    });

    var socket = io();

    // Function for the Right Button
    function comeToBase() {
        socket.emit("send_message", {
            text: "COME TO BASE"
        });
    }

    // Function for the Left Button
    function stopRobot() {
        socket.emit("send_message", {
            text: "STOP ROBOT"
        });
    }

  
    /* working ub bounds (i think, working bounds may be on tom's tablet)
    var imageBounds = [
        [42.99529, -78.79528],     // southwest
        [43.00772, -78.77519]      // northeast
    ];
    */

    // working home bounds, this lets leaflet know the bounds of our 'map.png' located in the 'static' folder
    //  in order to properly relate the gps positions drawn to the map to the map's size.
    var imageBounds = [
        [42.95677, -78.82238],     // southwest
        [42.96920, -78.80229]      // northeast
    ];

    L.imageOverlay("/static/map.png", imageBounds).addTo(map);
    map.fitBounds(imageBounds);

    
    // for now im just hardcoding, can't get the init routines to work for some reason
    // hardcoded for spot in front of tree in lot across slee and augsperger
    /*
    var markerRobot = L.circleMarker([42.997812, -78.783850], {
        color: 'blue',
        fillColor: '#30f',
        fillOpacity: 0.8,
        radius: 5,
        weight: 2
    }).addTo(map);

    markerRobot.bindTooltip("Robot", { 
        permanent: true, 
        direction: 'right' 
    });

    var pathRobot = L.polyline([], {
        color: "blue",
        weight: 3
    }).addTo(map);
    */

    // i have to update this to work with two gps locations, the beacon and robot.
    // alright, i just naively updated everything, we'll see if it works...

    // note for jetsonScript that passes data to here, first coordinates are the robot's/jetson's and second are the beacon's

    // think i'll just set a flag here to handle the first valid gps coordinates received on the user side,
    //  and handle that first marker being drawn within the gps_update function
    /* this works on its own for a single/robot only marker
    socket.on("gps_update", function(data) {
        var latlng1 = [data.lat1, data.lon1];

        markerRobot.setLatLng(latlng1);
        pathRobot.addLatLng(latlng1);
    });
    */

    var markerRobot;
    
    var pathRobot;

    var markerBeacon;

    var pathBeacon;

    var first_valid_coordinates = false;

//  TESTED THIS as far as initial gps are concerned AT HOME AND IT WORKS NOW FOR THE ZED ONLY,
//   HAVE TO TEST WITH BOTH BUT SHOULD BE GOOD ONCE I FIX IT UP TO DO SO
    socket.on("gps_update", function(data) {
        var latlng1 = [data.lat1, data.lon1];   // robot coordinates
        var latlng2 = [data.lat2, data.lon2];   // beacon coordinates

        if (!first_valid_coordinates) {
            // draw the first/initial marker for robot upon receipt of first valid coordinates
            markerRobot = L.circleMarker([data.lat1, data.lon1], {
                color: 'red',
                fillColor: '#f00',
                fillOpacity: 0.8,
                radius: 5,
                weight: 2
            }).addTo(map);
            
            markerRobot.bindTooltip("Robot", { 
            permanent: true, 
            direction: 'auto',
            opacity: 0.5
            });
        
            pathRobot = L.polyline([], {
                color: "red",
                weight: 3
            }).addTo(map);

            // create initial beacon marker and path, bind marker name
            markerBeaconcircleMarker([data.lat2, data.lon2], {
                color: 'blue',
                fillColor: '#30f',
                fillOpacity: 0.8,
                radius: 5,
                weight: 2
            }).addTo(map);

            markerBeacon.bindTooltip("Beacon", { 
                permanent: true, 
                direction: 'auto',
                opacity: 0.5
            });

            pathBeacon = L.polyline([], {
                color: "blue",
                weight: 3
            }).addTo(map);

            first_valid_coordinates = true;
        }
        else {  // add to path and set new marker positions after initial markers drawn
            markerRobot.setLatLng(latlng1);
            pathRobot.addLatLng(latlng1);
            markerBeacon.setLatLng(latlng2);
            pathBeacon.addLatLng(latlng2);
        }
    });
</script>

</body>
</html>
